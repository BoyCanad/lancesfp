name: Deploy to Wasmer
on:
  push:
    branches: [ main, master ] # Triggers on push to main or master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stream/package-lock.json
          
      - name: Install dependencies
        run: npm install
        working-directory: stream
        
      - name: Build project
        run: npm run build
        working-directory: stream
        
      - name: Setup Wasmer
        uses: wasmerio/setup-wasmer@v3.1

      - name: Bump version in wasmer.toml
        working-directory: stream
        run: |
          VERSION="0.1.$(date +%s)"
          sed -i "s/^version = .*/version = \"$VERSION\"/" wasmer.toml
          echo "Deploying version $VERSION"

      - name: Deploy to Wasmer Edge
        working-directory: stream
        run: wasmer deploy --no-wait
        env:
          WASMER_TOKEN: ${{ secrets.WASMER_TOKEN }}

      - name: Purge Cloudflare cache for entry point files
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets not set, skipping purge."
            exit 0
          fi
          
          echo "Purging Cloudflare cache..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://www.lancesfp.fun/index.html",
                "https://www.lancesfp.fun/sw.js",
                "https://www.lancesfp.fun/manifest.webmanifest",
                "https://www.lancesfp.fun/"
              ]
            }' | jq '.success'

