name: Deploy to Wasmer
on:
  push:
    branches: [ main, master ] # Triggers on push to main or master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        working-directory: stream
        
      - name: Build project
        run: npm run build
        working-directory: stream
        
      - name: Deploy to Wasmer
        uses: wasmer-labs/deploy-action@v1
        with:
          wasmer-token: ${{ secrets.WASMER_TOKEN }}
          project-path: stream
