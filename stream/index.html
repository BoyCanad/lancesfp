<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- Primary Meta Tags -->
    <title>LSFPlus</title>
    <meta name="title" content="LSFPlus" />
    <meta name="description" content="Welcome to LSFPlus - A premium streaming experience. Explore exclusive movies, music, behind-the-scenes, and more." />

    <!-- Open Graph / Facebook / Messenger / Telegram -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LSFPlus" />
    <meta property="og:description" content="Welcome to LSFPlus - A premium streaming experience. Explore exclusive movies, music, behind-the-scenes, and more." />
    <meta property="og:image" content="https://raw.githubusercontent.com/BoyCanad/lancesfp/main/stream/public/images/collection.png" />
    <meta property="og:image:alt" content="LSFPlus Banner" />
    <meta property="og:site_name" content="LSFPlus" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LSFPlus" />
    <meta name="twitter:description" content="Welcome to LSFPlus - A premium streaming experience. Explore exclusive movies, music, behind-the-scenes, and more." />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/BoyCanad/lancesfp/main/stream/public/images/collection.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Force Unregister all Service Workers to eliminate playback interference
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service Worker unregistered successfully.');
            });
          }
        });
      }
      
      // Clear legacy caches that might slow down the filesystem
      window.caches.keys().then(names => {
        for (let name of names) window.caches.delete(name);
      });
    </script>
  </body>
</html>
